<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>[ 스마트 팜 테스트 중 ]</h1>
    <h2>센서 측정 간격 및 로그 저장 시간 입력</h2>
    <hr>
    <form action="" method="POST">
        {% csrf_token %}
        <div>
            <label for="recv_sec">센서 측정 간격 : </label>
            <input type="text" name="recv_sec" id="recv_sec">
        </div>
        <div>
            <label for="save_hour">로그 저장 시간 간격 : </label>
            <input type="text" name="save_hour" id="save_hour">
        </div>
        <br>
        <input type="submit" value="제출">
    </form>
</body>
</html>
