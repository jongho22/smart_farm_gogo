<!DOCTYPE html>
<html lang="en">
    <head>

        <title>스마트팜 관리 페이지</title>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="">
        <meta name="author" content="">

        <!--부트스트랩-->
        <link href="../static/css/bootstrap.min.css" rel="stylesheet">

        <!-- Custom styles for this template-->
        <link href="css/sb-admin-2.min.css" rel="stylesheet">

        <!-- Custom fonts for this template-->
        <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
        <link
            href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
            rel="stylesheet">

        <!--cdnjs-->
        <link href = "https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
        <link href = "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.css" rel = "stylesheet">
        <script src = "https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
        <script src = "https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>
        <script src ="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js"></script>
    
    </head>
    <body id = "page-top">
        
        <div class="container">
            <canvas id = "canvas"></canvas>
        </div>

        <script>
            $(document).ready(function() {
                const config ={
                    type: 'line',
                    data: {
                        labels : [],
                        datasets : [{
                            label : "Temperature",
                            yAxisID: "A",
                            backgroundColor : 'rgb(255,99,231)',
                            borderColor: 'rgb(255,99,132)',
                            data : [],
                            fill : false,
                        },{
                            label : "humi",
                            yAxisID: "B",
                            backgroundColor : 'rgb(255,99,0)',
                            borderColor: 'rgb(255,99,0)',
                            data : [],
                            fill : false,
                        }]
                    },
                    options : {
                        responsive : true,
                        title : {
                            display : true,
                            text : "Temperature Measurement"
                        },
                        scales : {
                            xAxes : [{
                                display : true,
                                scaleLabel : {
                                    display : true,
                                    labelString: 'Time'
                                }
                            }],
                            yAxes : [{
                                id: 'A',
                                display : true,
                                scaleLabel : {
                                    display : true,
                                    labelString: 'Temp'
                                }
                            },{
                                id: 'B',
                                display : true,
                                scaleLabel : {
                                    display : true,
                                    labelString: 'Humi'
                                }
                            }
                        ]
                        },
                        tooltips: {
                            mode : 'index',
                            intersect : false,
                        },
                        hover : {
                            mode: 'nearest',
                            intersect: true
                        }
                    }
                };

                const context = document.getElementById('canvas').getContext('2d');
                const lineChart = new Chart(context, config);
                const source = new EventSource("/graph")

                source.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    if (config.data.labels.length === 20) {
                        config.data.labels.shift();
                        config.data.datasets[0].data.shift();
                        config.data.datasets[1].data.shift();
                    }
                    config.data.labels.push(data.time);
                    config.data.datasets[0].data.push(data.value1);
                    config.data.datasets[1].data.push(data.value2);
                    lineChart.update();
                }
            });
        </script>

        <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <!-- Page level plugins -->
    <script src="vendor/chart.js/Chart.min.js"></script>

    <!-- Page level custom scripts -->
    <script src="js/demo/chart-area-demo.js"></script>
    <script src="js/demo/chart-pie-demo.js"></script>
    </body>
</html>
